name: ML CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint
        run: flake8 src/


  train-eval:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc

      - name: Pull DVC data
        run: dvc pull --force

      - name: Train
        run: python src/train.py

      - name: Evaluate
        run: python src/evaluate.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-artifacts
          path: |
            model/
            data/split/


  docker:
    needs: train-eval
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/download-artifact@v4
        with:
          name: ml-artifacts

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build
        run: docker build -t surbhibagad/soil-ml:latest .

      - name: Push
        run: docker push surbhibagad/soil-ml:latest